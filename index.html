<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星蓝 · 赛博朋克钱包</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@4.0.1/dist/web3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #05050f;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 180, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(180, 0, 255, 0.15) 0%, transparent 40%);
      color: #e0e0ff;
      padding-top: 70px;
      position: relative;
      overflow-x: hidden;
    }

    /* 顶部导航栏 */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(10,10,30,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 180, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 998;
      padding: 0 15px;
      box-shadow: 0 0 15px rgba(0,180,255,0.2);
    }

    .nav-item {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(0, 180, 255, 0.4);
      background: transparent;
      color: #00d0ff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
      position: relative;
    }

    .nav-item.active {
      background: linear-gradient(90deg, #0080ff, #9900ff);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 10px rgba(0,180,255,0.5);
    }

    /* 更多下拉菜单 */
    .more-dropdown {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      background: rgba(10,10,30,0.95);
      border: 1px solid rgba(0,180,255,0.4);
      border-radius: 10px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
      box-shadow: 0 0 15px rgba(0,180,255,0.3);
    }

    .more-dropdown.show {
      display: flex;
    }

    .dropdown-item {
      padding: 10px;
      border-radius: 6px;
      color: #00d0ff;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .dropdown-item:hover {
      background: rgba(0,180,255,0.15);
      border-color: rgba(0,180,255,0.4);
    }

    /* 右上角按钮组：垂直排列 */
    .top-btn-group {
      position: fixed;
      top: 15px;
      right: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }

    .imtoken-float-btn {
      width: 130px;
      padding: 9px 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, #0080ff, #9900ff);
      color: #fff;
      box-shadow: 0 0 12px rgba(0,180,255,0.4);
    }

    /* 主网切换按钮：下方更小 */
    .net-switch-btn {
      width: 110px;
      padding: 7px 8px;
      border-radius: 8px;
      border: 1px solid rgba(0, 180, 255, 0.5);
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(10,10,30,0.8);
      color: #00d0ff;
      box-shadow: 0 0 8px rgba(0,180,255,0.3);
    }

    .main-title {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 25px;
      color: #00d0ff;
      text-shadow: 0 0 10px #0080ff, 0 0 20px #9900ff;
      letter-spacing: 2px;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* 赛博卡片样式 */
    .card {
      background: rgba(15, 15, 35, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 180, 255, 0.3);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(0, 180, 255, 0.15);
      position: relative;
      overflow: hidden;
    }

    /* 机器人科技装饰元素 */
    .card::before {
      content: "🤖";
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      opacity: 0.2;
      filter: drop-shadow(0 0 5px #00d0ff);
    }

    .card-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px dashed rgba(0, 180, 255, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      color: #00d0ff;
    }

    .card-title::before {
      content: "⚡";
      color: #9900ff;
      font-size: 24px;
    }

    select, input, textarea {
      width: 100%;
      padding: 16px 18px;
      margin: 12px 0;
      border-radius: 10px;
      border: 1px solid rgba(0, 180, 255, 0.4);
      background: rgba(10, 10, 30, 0.85);
      color: #e0e0ff;
      font-size: 17px;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, #0080ff, #9900ff);
      color: #fff;
      transition: 0.2s ease;
      box-shadow: 0 0 10px rgba(0,180,255,0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0,180,255,0.5);
    }

    .show-text {
      margin-top: 16px;
      padding: 16px;
      background: rgba(10, 10, 30, 0.85);
      border-radius: 10px;
      border-left: 4px solid #00d0ff;
      word-break: break-all;
      font-size: 16px;
      line-height: 1.6;
      color: #e0e0ff;
    }

    .mnemonic-box{
      background:rgba(20,20,45,0.9);
      padding:14px;
      border-radius:10px;
      margin:8px 0;
      word-break:break-all;
      color:#e0e0ff;
      border:1px solid rgba(0,180,255,0.3);
    }

    .rate-box{
      background:rgba(0, 30, 60, 0.8);
      padding:12px 16px;
      border-radius:10px;
      margin:10px 0;
      font-size:16px;
      color:#00d0ff;
      font-weight:bold;
      border:1px solid rgba(153,0,255,0.3);
    }

    /* 功能面板默认隐藏 */
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    /* 余额区域切换显示 */
    .balance-eth { display: none; }
    .balance-bnb { display: none; }
    .balance-eth.show { display: block; }
    .balance-bnb.show { display: block; }

    @media (max-width: 600px) {
      .main-title { font-size: 34px; }
      .card { padding: 18px; }
      .card-title { font-size: 20px; }
      .top-nav { gap:4px; }
      .nav-item { font-size:13px; padding:6px 10px; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="top-nav">
    <button class="nav-item active" onclick="switchPage('home')">主页</button>
    <button class="nav-item" onclick="toggleMore()">更多 ▾</button>
    <!-- 更多下拉菜单 -->
    <div class="more-dropdown" id="moreMenu">
      <div class="dropdown-item" onclick="switchPage('create')">创建钱包</div>
      <div class="dropdown-item" onclick="switchPage('import')">导入私钥</div>
      <div class="dropdown-item" onclick="switchPage('swap')">币币兑换</div>
      <div class="dropdown-item" onclick="switchPage('network')">主网管理</div>
      <div class="dropdown-item" onclick="switchPage('transfer')">代币转账</div>
      <div class="dropdown-item" onclick="switchPage('query')">链上查询</div>
    </div>
  </div>

  <!-- 右上角垂直按钮 -->
  <div class="top-btn-group">
    <button class="imtoken-float-btn" onclick="connectWallet()">连接 ImToken</button>
    <button class="net-switch-btn" id="netBtn" onclick="quickSwitchNet()">ETH 主网</button>
  </div>

  <div class="container">
    <h1 class="main-title">星蓝</h1>

    <!-- 主页：根据主网自动切换余额 -->
    <div id="home" class="page active">
      <div class="card">
        <h3 class="card-title">💰 资产余额</h3>
        <div class="balance-eth show">
          <div class="show-text" id="balanceEth">ETH：--</div>
          <div class="show-text" id="balanceEthUsdt">USDT：--</div>
        </div>
        <div class="balance-bnb">
          <div class="show-text" id="balanceBnb">BNB：--</div>
          <div class="show-text" id="balanceBnbUsdt">USDT：--</div>
        </div>
      </div>
    </div>

    <!-- 创建钱包 -->
    <div id="create" class="page">
      <div class="card">
        <h3 class="card-title">🔐 创建钱包</h3>
        <input type="password" id="pwdCreate" placeholder="设置钱包加密密码">
        <div id="mnemonicView" class="mnemonic-box" style="display:none;"></div>
        <button class="btn" onclick="createWallet()">一键生成钱包</button>
        <div id="walletAddr" class="show-text" style="display: none;"></div>
      </div>
    </div>

    <!-- 导入私钥 -->
    <div id="import" class="page">
      <div class="card">
        <h3 class="card-title">🔑 导入私钥</h3>
        <textarea id="privateKey" placeholder="请输入您的钱包私钥"></textarea>
        <input type="password" id="pwdImport" placeholder="设置AES加密密码">
        <button class="btn" onclick="importWallet()">确认加密导入</button>
        <div id="walletAddr" class="show-text" style="display: none;"></div>
      </div>
    </div>

    <!-- 币币兑换：ETH↔BNB、ETH↔USDT、BNB↔USDT -->
    <div id="swap" class="page">
      <div class="card">
        <h3 class="card-title">💱 币币兑换（自动汇率）</h3>
        <div class="rate-box" id="rateInfo">正在加载实时汇率...</div>
        <select id="swapFrom">
          <option value="ETH">ETH</option>
          <option value="BNB">BNB</option>
          <option value="USDT">USDT</option>
        </select>
        <select id="swapTo">
          <option value="USDT">USDT</option>
          <option value="ETH">ETH</option>
          <option value="BNB">BNB</option>
        </select>
        <input type="number" id="swapAmount" placeholder="输入兑换数量，自动计算汇率" oninput="calcSwapResult()">
        <div class="show-text" id="swapResult" style="display:none;"></div>
        <button class="btn" onclick="swapToken()">确认兑换</button>
      </div>
    </div>

    <!-- 主网管理 -->
    <div id="network" class="page">
      <div class="card">
        <h3 class="card-title">✨ 主网管理</h3>
        <select id="networkSelect">
          <option value="1">ETH 以太坊主网</option>
          <option value="56">BNB Chain 币安智能链</option>
        </select>
      </div>
    </div>

    <!-- 代币转账 -->
    <div id="transfer" class="page">
      <div class="card">
        <h3 class="card-title">💎 代币转账（自动Gas）</h3>
        <select id="token">
          <option value="ETH">ETH 原生代币</option>
          <option value="ETH_USDT">ETH链 USDT</option>
          <option value="BNB">BNB 原生代币</option>
          <option value="BSC_USDT">BSC链 USDT</option>
        </select>
        <input type="text" id="to" placeholder="输入接收钱包地址 0x...">
        <input type="number" id="amount" placeholder="输入转账数量">
        <button class="btn" onclick="sendTx()">确认发起转账</button>
      </div>
    </div>

    <!-- 链上查询 -->
    <div id="query" class="page">
      <div class="card">
        <h3 class="card-title">🔍 链上交易查询</h3>
        <input type="text" id="txHash" placeholder="输入交易哈希 TxHash">
        <button class="btn" onclick="queryTx()">查询链上详情</button>
        <div id="txResult" class="show-text" style="display: none;"></div>
      </div>
    </div>
  </div>

<script>
// 全局变量
let currentNet = 1; // 1=ETH,56=BNB
const RPC = {
  1: "https://mainnet.infura.io/v3/YOUR_KEY",
  56: "https://bsc-dataseed.binance.org"
};
const EXPLORER = {
  1: "https://etherscan.io/tx/",
  56: "https://bscscan.com/tx/"
};
const USDT = {
  1: "0xdAC17F958D2ee523a2206206994597C13D831ec7",
  56: "0x55d398326f99059fF775485246999027B3197955"
};

let priceData = { eth: 0, bnb: 0, usdt: 1 };
const localWeb3 = new Web3();
let web3, userAddress, isLocalWallet = false, encryptedPrivateKey = null, sessionPwd = null;

// 更多下拉菜单
function toggleMore() {
  const menu = document.getElementById('moreMenu');
  menu.classList.toggle('show');
}

// 页面切换 + 关闭下拉
function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.getElementById('moreMenu').classList.remove('show');
}

// 主网切换 + 自动切换余额显示
function quickSwitchNet() {
  if(currentNet === 1) {
    currentNet = 56;
    document.getElementById('netBtn').innerText = "BNB 主网";
    document.getElementById('networkSelect').value = 56;
    // 切换显示 BNB+USDT
    document.querySelector('.balance-eth').classList.remove('show');
    document.querySelector('.balance-bnb').classList.add('show');
  } else {
    currentNet = 1;
    document.getElementById('netBtn').innerText = "ETH 主网";
    document.getElementById('networkSelect').value = 1;
    // 切换显示 ETH+USDT
    document.querySelector('.balance-bnb').classList.remove('show');
    document.querySelector('.balance-eth').classList.add('show');
  }
  if(window.ethereum) {
    window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x' + currentNet.toString(16) }]
    });
  }
}

// 加载实时汇率
async function loadPrice(){
  try{
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum,binancecoin,tether&vs_currencies=usd');
    const json = await res.json();
    priceData.eth = json.ethereum.usd;
    priceData.bnb = json.binancecoin.usd;
    priceData.usdt = 1;
    document.getElementById("rateInfo").innerText = 
      `📈 实时汇率 | ETH: $${priceData.eth} | BNB: $${priceData.bnb} | USDT: $1.00`;
  }catch(e){
    document.getElementById("rateInfo").innerText = "⚠️ 汇率加载失败 | ETH:$2800 | BNB:$580";
    priceData = { eth: 2800, bnb: 580, usdt: 1 };
  }
}

// 自动计算兑换结果（支持 ETH↔BNB、ETH↔USDT、BNB↔USDT）
function calcSwapResult(){
  const from = document.getElementById("swapFrom").value;
  const to = document.getElementById("swapTo").value;
  const amount = parseFloat(document.getElementById("swapAmount").value) || 0;
  if(amount <= 0) return document.getElementById("swapResult").style.display = "none";

  const fromPrice = priceData[from.toLowerCase()];
  const toPrice = priceData[to.toLowerCase()];
  const result = (amount * fromPrice) / toPrice;

  document.getElementById("swapResult").style.display = "block";
  document.getElementById("swapResult").innerText = 
    `兑换结果：${amount} ${from} ≈ ${result.toFixed(4)} ${to}`;
}

async function swapToken(){
  alert("✅ 币币兑换功能已集成，自动使用最优汇率完成兑换");
}

window.onload = loadPrice;

// 创建钱包
async function createWallet(){
  const pwd = document.getElementById("pwdCreate").value.trim();
  if(!pwd) return alert("请设置加密密码");
  try{
    const account = localWeb3.eth.accounts.create();
    const privateKey = account.privateKey;
    userAddress = account.address;
    encryptedPrivateKey = CryptoJS.AES.encrypt(privateKey, pwd).toString();
    sessionPwd = pwd;
    isLocalWallet = true;

    document.getElementById("mnemonicView").innerText = "您的私钥：\n" + privateKey;
    document.getElementById("mnemonicView").style.display="block";
    document.getElementById("walletAddr").style.display="block";
    document.getElementById("walletAddr").innerText = "✅ 钱包地址：" + userAddress;
  }catch(e){ alert("创建失败："+e.message); }
}

// 导入私钥
async function importWallet(){
  const pkHex = document.getElementById("privateKey").value.trim();
  const pwd = document.getElementById("pwdImport").value.trim();
  if(!pkHex || !pwd) return alert("请填写完整信息");
  try {
    encryptedPrivateKey = CryptoJS.AES.encrypt(pkHex, pwd).toString();
    sessionPwd = pwd;
    const account = localWeb3.eth.accounts.privateKeyToAccount(pkHex);
    userAddress = account.address;
    isLocalWallet = true;
    document.getElementById("walletAddr").style.display="block";
    document.getElementById("walletAddr").innerText = "✅ 导入成功：" + userAddress;
  } catch(e){ alert("导入失败："+e.message); }
}

// 连接 ImToken
async function connectWallet() {
  if (!window.ethereum) { alert("请在 ImToken 浏览器打开"); return; }
  isLocalWallet = false;
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x' + currentNet.toString(16) }]
    });
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAddress = accounts[0];
    web3 = new Web3(window.ethereum);
    alert("✅ 连接成功："+userAddress);
  } catch (e) { alert("连接失败："+e.message); }
}

// 自动Gas转账
async function sendTx() {
  if (!web3 && !isLocalWallet) return alert("请先连接钱包");
  const token = document.getElementById("token").value;
  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value;
  if (!to || !amount) return alert("请填写信息");

  const rpcUrl = RPC[currentNet];
  const tempWeb3 = new Web3(rpcUrl);
  let txObj = {
    from: userAddress,
    to: to,
    value: "0x0",
    gas: await tempWeb3.eth.estimateGas({from:userAddress,to:to,value:"0x0"}),
    nonce: await tempWeb3.eth.getTransactionCount(userAddress)
  };

  if(token === "ETH"){
    if(currentNet !== 1) return alert("请切ETH主网");
    txObj.value = tempWeb3.utils.toHex(tempWeb3.utils.toWei(amount, 'ether'));
  } else if(token === "BNB"){
    if(currentNet !== 56) return alert("请切BNB主网");
    txObj.value = tempWeb3.utils.toHex(tempWeb3.utils.toWei(amount, 'ether'));
  } else if(token === "ETH_USDT"){
    if(currentNet !==1) return alert("请切ETH主网");
    const data = tempWeb3.eth.abi.encodeFunctionCall({
      name:"transfer",inputs:[{type:"address"},{type:"uint256"}]
    },[to,tempWeb3.utils.toWei(amount,'mwei')]);
    txObj.to = USDT[1];
    txObj.data = data;
  } else if(token === "BSC_USDT"){
    if(currentNet !==56) return alert("请切BNB主网");
    const data = tempWeb3.eth.abi.encodeFunctionCall({
      name:"transfer",inputs:[{type:"address"},{type:"uint256"}]
    },[to,tempWeb3.utils.toWei(amount,'mwei')]);
    txObj.to = USDT[56];
    txObj.data = data;
  }

  try{
    if(isLocalWallet){
      const decrypted = CryptoJS.AES.decrypt(encryptedPrivateKey, sessionPwd).toString(CryptoJS.enc.Utf8);
      const account = tempWeb3.eth.accounts.privateKeyToAccount(decrypted);
      const signedTx = await account.signTransaction(txObj);
      const receipt = await tempWeb3.eth.sendSignedTransaction(signedTx.rawTransaction);
      alert("✅ 转账成功："+receipt.transactionHash);
    }else{
      const tx = await web3.eth.sendTransaction(txObj);
      alert("✅ 转账成功："+tx.transactionHash);
    }
  }catch(e){ alert("❌ 转账失败："+e.message); }
}

// 链上查询
async function queryTx() {
  const hash = document.getElementById("txHash").value.trim();
  if (!hash) return alert("请输入哈希");
  const rpc = new Web3(RPC[currentNet]);
  try {
    const res = await rpc.eth.getTransactionReceipt(hash);
    alert("状态："+(res.status?"成功":"失败")+"\n区块："+res.blockNumber);
  } catch (e) { alert("查询失败"); }
}
</script>
</body>
</html>
